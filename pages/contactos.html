<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contactos</title>
</head>
    <link rel="stylesheet" href="../css/contactos.css">
<body>
    <header> Tech SJM 2026</header> 
    
   <div class = "caixaCorpo">
        <div class="caixaContacto">
            <div class="titulo"> <h1>Contactos</h1> </div>
            <div class="primeiroNome">
                <label for="primeiroNome">Primeiro Nome:</label>
                <input type="text" id="primeiroNome" name="primeiroNome">
            </div>

            <div class="ultimoNome">
                <label for="ultimoNome">Último Nome:</label>
                <input type="text" id="ultimoNome" name="ultimoNome">
            </div>

            <div class="morada">
                <label for="morada"> Morada:</label>
                <input type="text" id="morada" name="morada">
            </div>

            <div class="email">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="mensagem">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" placeholder="Introduza aqui a sua mensagem" name="mensagem"></textarea>
            </div>

            <div id="mensagemStatus"> </div>

            <div class="botao">
                <button id="btnSubmit" class="btn-submit">Enviar</button>
            </div>
        </div>
   </div>

   <script src="../js/contactos.js"></script>

</body>
</html>
